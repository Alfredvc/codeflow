name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: pnpm install --no-frozen-lockfile
      - name: Verify tag and package version
        run: |
          node - <<'NODE'
          const { readFileSync } = require('node:fs');

          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          const version = pkg.version;
          const tag = process.env.GITHUB_REF_NAME?.replace(/^v/, '');
          if (tag !== version) {
            console.error(`::error::Tag v${tag} does not match package.json version ${version}`);
            process.exit(1);
          }
          NODE
      - run: pnpm run verify:release
      - name: Pack @aharness/codeflow
        id: pack-codeflow
        run: |
          mkdir -p "$RUNNER_TEMP/codeflow-pack"
          pnpm pack --pack-destination "$RUNNER_TEMP/codeflow-pack" --json > "$RUNNER_TEMP/codeflow-pack.json"
          tarball=$(node -e "const p=require(process.env.RUNNER_TEMP + '/codeflow-pack.json'); const item=Array.isArray(p)?p[0]:p; console.log(item.filename || item.path)")
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - name: Publish @aharness/codeflow
        run: npm publish "${{ steps.pack-codeflow.outputs.tarball }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
